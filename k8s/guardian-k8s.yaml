apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardian-api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guardian-api
  template:
    metadata:
      labels:
        app: guardian-api
    spec:
      containers:
        - name: guardian-api
          image: sauldevmx/guardian-api:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_REDIS_HOST
              value: "redis-service"
            - name: SPRING_REDIS_PORT
              value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: guardian-api-service
spec:
  type: NodePort
  ports:
    - port: 8080
      nodePort: 30080 # Puerto por el que entraremos desde afuera
  selector:
    app: guardian-api
